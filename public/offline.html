<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Wellness+</title>
  <meta name="theme-color" content="#0a1615" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a1615; color: #F5F1E8;
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; }
    .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px; text-align: center; }
    .mark { width: 96px; height: 96px; margin-bottom: 28px; opacity: 0.92; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.01em; }
    p { font-size: 15px; line-height: 1.5; color: #B7C4C0; max-width: 320px; margin: 0 0 28px; }
    button { appearance: none; border: 1px solid #1f3d3a; background: #122422; color: #F5F1E8;
      font: inherit; font-weight: 600; padding: 12px 22px; border-radius: 12px; cursor: pointer;
      min-height: 44px; }
    button:hover { background: #182d2b; }
    button:focus-visible { outline: 2px solid #7ee0c8; outline-offset: 2px; }
    .hint { margin-top: 18px; font-size: 12px; color: #6c7c78; }
  </style>
</head>
<body>
  <main class="wrap" role="main">
    <img class="mark" src="/icon-192.png" alt="" aria-hidden="true" />
    <h1>You’re offline</h1>
    <p>Your last check-in is saved. Reconnect to sync your day and load new content.</p>
    <button type="button" onclick="location.reload()" aria-label="Try reconnecting">Try again</button>
    <div class="hint">Wellness+ works offline once the app shell has loaded.</div>
  </main>
</body>
</html>
